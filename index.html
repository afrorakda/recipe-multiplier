<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>#36 Recipe Multiplier - Fridge Combo</title>
    
    <link rel="apple-touch-icon" href="image_36.png">
    <link rel="icon" type="image/png" href="image_36.png">

    <style>
        :root { --bg: #fff; --main: #333; --accent: #eee; --input-bg: #fafafa; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: var(--main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        .container { flex: 1; padding: 20px; max-width: 420px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        
        header { margin-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 500; margin-top: 4px; }

        .input-area { position: relative; width: 100%; margin-top: 10px; }
        textarea {
            width: 100%; height: 250px; background: var(--input-bg); border: 1px solid var(--accent); border-radius: var(--radius);
            padding: 15px; font-size: 1rem; line-height: 1.5; color: var(--main); outline: none; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }

        .clear-recipe { 
            display: block; width: fit-content; margin: 8px 0 0 auto; background: var(--accent); color: var(--main); 
            border: none; padding: 6px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; 
        }

        /* 18:00準拠：4列の肉厚なボタン */
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .controls button { height: 54px; }

        /* カスタム行：入力窓内×とGoボタンのみ */
        .custom-row { grid-column: span 4; display: flex; gap: 10px; margin-top: 5px; align-items: stretch; height: 54px; }
        
        .input-wrapper { position: relative; flex: 2.5; display: flex; align-items: center; }
        input[type="number"] {
            width: 100%; height: 100%; background: var(--input-bg); border: 1px solid var(--accent); border-radius: var(--radius);
            padding: 0 40px 0 15px; font-size: 1.1rem; text-align: center; outline: none; font-weight: bold;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        .inner-clear { 
            position: absolute; right: 12px; color: #bbb; font-size: 1.4rem; cursor: pointer; 
            padding: 5px; user-select: none; line-height: 1;
        }

        button { background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .go-btn { flex: 1; font-size: 1.2rem; }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 25px 0; margin-top: auto; }
        .kofi-btn, .home-btn { 
            display: inline-flex; align-items: center; justify-content: center; width: 100%; max-width: 320px; 
            padding: 14px; border-radius: var(--radius); font-weight: bold; font-size: 0.9rem; text-decoration: none; border: none; 
        }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { padding-bottom: 30px; text-align: center; font-size: 0.75rem; color: #bbb; line-height: 1.6; }

        /* Modal: #35 Tabata完全準拠 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; max-width: 320px; width: 90%; position: relative; text-align: left; }
        .modal-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; font-weight: 800; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; padding: 5px; line-height: 1; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>#36 Recipe Multiplier</h1>
        <p class="subtitle">Scale your recipe portions instantly.</p>
    </header>

    <div class="input-area">
        <textarea id="recipeInput" placeholder="Paste recipe here..." oninput="handleInput()"></textarea>
        <button class="clear-recipe" onclick="clearRecipe()">Clear Recipe</button>
    </div>

    <div class="controls">
        <button onclick="multiply(0.5)">x0.5</button>
        <button onclick="multiply(2)">x2</button>
        <button onclick="multiply(3)">x3</button>
        <button onclick="multiply(4)">x4</button>
        
        <div class="custom-row">
            <div class="input-wrapper">
                <input type="number" id="customInput" placeholder="ex) 1.5" step="0.1" inputmode="decimal">
                <span class="inner-clear" onclick="clearCustom()">&times;</span>
            </div>
            <button class="go-btn" onclick="multiply(document.getElementById('customInput').value)">Go</button>
        </div>
    </div>
</div>

<div class="footer-btns">
    <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">Buy me a coffee</a>
    <button class="home-btn" id="homeBtn">Add to Home Screen</button>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <div class="modal-title-row"><span>📱</span><strong>Install</strong></div>
        <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">Add to home screen.</p>
        <div style="font-size: 0.95rem; line-height: 1.5; color: #333;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    let originalText = "";
    function handleInput() { originalText = document.getElementById('recipeInput').value; }
    function clearRecipe() { document.getElementById('recipeInput').value = ""; originalText = ""; }
    function clearCustom() { document.getElementById('customInput').value = ""; }

    function multiply(ratio) {
        const r = parseFloat(ratio);
        if (isNaN(r) || r <= 0) return;
        if (!originalText) {
            originalText = document.getElementById('recipeInput').value;
            if (!originalText) return;
        }
        // 話し合った通り、分子のみに乗算（約分なし）
        let result = originalText.replace(/(\d+)\/(\d+)/g, function(match, p1, p2) {
            const num = parseFloat(p1) * r;
            return Math.round(num * 100) / 100 + "/" + p2;
        });
        result = result.replace(/(?<!\/)\b(\d+(\.\d+)?)\b(?!\/)/g, function(match) {
            const num = parseFloat(match);
            return Math.round(num * r * 100) / 100;
        });
        document.getElementById('recipeInput').value = result;
    }

    // Modal logic (#35 Tabata準拠)
    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
</script>

</body>
</html>
