<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recipe Multiplier</title>
    
    <link rel="apple-touch-icon" href="image_36.png">
    <link rel="icon" type="image/png" href="image_36.png">

    <style>
        :root { --bg: #fff; --main: #333; --accent: #eee; --input-bg: #fafafa; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); color: var(--main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; min-height: 100vh; 
            -webkit-font-smoothing: antialiased;
        }

        .container { flex: 1; padding: 20px; max-width: 420px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; }
        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: 12px;
        }
        .subtitle { font-size: 0.85rem; color: #999; font-weight: 700; margin-bottom: 25px; }

        .input-area { position: relative; width: 100%; margin-bottom: 15px; }
        textarea {
            width: 100%; height: 250px; background: var(--input-bg); border: 2px solid var(--accent); border-radius: var(--radius);
            padding: 15px 45px 15px 15px; font-size: 1rem; font-weight: 700; line-height: 1.5; color: var(--main); outline: none; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb; -webkit-text-fill-color: #bbb; }

        .clr-btn {
            position: absolute; right: 12px; top: 12px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border: none; border-radius: 50%;
            font-size: 16px; font-weight: bold; cursor: pointer; display: none;
            align-items: center; justify-content: center; z-index: 2;
        }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 5px; }
        .controls button { height: 54px; }

        .custom-row { grid-column: span 4; display: flex; gap: 10px; margin-top: 5px; align-items: stretch; height: 54px; }
        
        .input-wrapper { position: relative; flex: 2.5; display: flex; align-items: center; }
        input[type="number"] {
            width: 100%; height: 100%; background: var(--input-bg); border: 2px solid var(--accent); border-radius: var(--radius);
            padding: 0 40px 0 15px; font-size: 1.1rem; text-align: center; outline: none; font-weight: 900;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        input::placeholder { color: #bbb; -webkit-text-fill-color: #bbb; }

        .inner-clear { 
            position: absolute; right: 10px; width: 24px; height: 24px; background: #ddd; color: #fff;
            border-radius: 50%; font-size: 14px; font-weight: bold; display: none;
            align-items: center; justify-content: center; cursor: pointer; user-select: none;
        }

        button { background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 900; cursor: pointer; -webkit-appearance: none; }
        button:active { transform: scale(0.96); }
        .go-btn { flex: 1; font-size: 1.1rem; }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 25px 0; margin-top: auto; }
        .kofi-btn, .home-btn { 
            display: inline-flex; align-items: center; justify-content: center; width: 100%; max-width: 320px; 
            padding: 16px; border-radius: var(--radius); font-weight: 900; font-size: 0.9rem; text-decoration: none; border: none; 
        }
        .kofi-btn { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { padding-bottom: 30px; text-align: center; font-size: 0.7rem; color: #bbb; line-height: 1.6; font-weight: 600; }
        footer a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 35px; border-radius: var(--radius); max-width: 320px; width: 90%; position: relative; text-align: left; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Recipe Multiplier</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Scale your portions instantly.</p>

    <div class="input-area">
        <textarea id="recipeInput" placeholder="Paste recipe here..." oninput="handleInput()"></textarea>
        <button id="clrRecipe" class="clr-btn" onclick="clearRecipe()">×</button>
    </div>

    <div class="controls">
        <button onclick="multiply(0.5)">x0.5</button>
        <button onclick="multiply(2)">x2</button>
        <button onclick="multiply(3)">x3</button>
        <button onclick="multiply(4)">x4</button>
        
        <div class="custom-row">
            <div class="input-wrapper">
                <input type="number" id="customInput" placeholder="1.5" step="0.1" inputmode="decimal" oninput="toggleCustomClr()">
                <span id="clrCustom" class="inner-clear" onclick="clearCustom()">×</span>
            </div>
            <button class="go-btn" onclick="multiply(document.getElementById('customInput').value)">Go</button>
        </div>
    </div>
</div>

<div class="footer-btns">
    <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
    <button class="home-btn" id="homeBtn">Add to Home Screen</button>
</div>

<footer id="dynamicFooter">
    No login / No tracking / No ads / Browser only<br>
    <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
</footer>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">×</span>
        <h2 style="margin-bottom: 15px; font-weight: 900;">📱 Install</h2>
        <p style="margin-bottom: 20px; color: #999; font-size: 0.85rem; font-weight: 700;">Add to home screen.</p>
        <div style="font-size: 0.9rem; line-height: 1.6; color: var(--main); font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    let originalText = "";

    function handleInput() {
        const area = document.getElementById('recipeInput');
        const clr = document.getElementById('clrRecipe');
        originalText = area.value;
        clr.style.display = originalText ? "flex" : "none";
    }

    function clearRecipe() {
        const area = document.getElementById('recipeInput');
        area.value = "";
        originalText = "";
        handleInput();
        area.focus();
    }

    function toggleCustomClr() {
        const val = document.getElementById('customInput').value;
        document.getElementById('clrCustom').style.display = val ? "flex" : "none";
    }

    function clearCustom() {
        document.getElementById('customInput').value = "";
        toggleCustomClr();
    }

    function multiply(ratio) {
        const r = parseFloat(ratio);
        if (isNaN(r) || r <= 0) return;
        
        let textToProcess = document.getElementById('recipeInput').value;
        if (!textToProcess) return;

        // 1. 分数の分子のみ計算
        let result = textToProcess.replace(/(\d+(\.\d+)?)\/(\d+)/g, function(match, p1, p2, p3) {
            const num = parseFloat(p1) * r;
            return Math.round(num * 100) / 100 + "/" + p3;
        });
        
        // 2. 単位直前の数値計算（分母を避ける）
        result = result.replace(/(?<!\/)\b(\d+(\.\d+)?)(?![0-9.\/])/g, function(match) {
            const num = parseFloat(match);
            return Math.round(num * r * 100) / 100;
        });
        
        document.getElementById('recipeInput').value = result;
        handleInput();
    }

    // Modal
    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

    // Footer補助ロジック
    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch (e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
