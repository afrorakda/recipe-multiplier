<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recipe Multiplier - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_36.png">
    <link rel="icon" type="image/png" href="image_36.png">
    <style>
        :root { --bg: #fff; --main: #333; --accent: #eee; --input-bg: #fafafa; --radius: 15px; --clear-gray: #bbb; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; padding: 20px; max-width: 420px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        header { margin-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 800; }
        .subtitle { font-size: 0.85rem; color: #666; margin-top: 4px; }

        /* 15:48のレイアウトを完全参照 */
        textarea {
            width: 100%; height: 250px; background: var(--input-bg); border: 1px solid var(--accent); border-radius: var(--radius);
            padding: 15px; font-size: 1rem; line-height: 1.5; color: var(--main); outline: none; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        .clear-recipe {
            display: block; width: fit-content; margin: 8px 0 0 auto; background: var(--accent); color: var(--main);
            border: none; padding: 8px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
        }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .custom-row { grid-column: span 4; display: flex; gap: 10px; margin-top: 5px; align-items: stretch; height: 54px; }

        input[type="number"] {
            flex: 1; background: var(--input-bg); border: 1px solid var(--accent); border-radius: var(--radius);
            padding: 0 15px; font-size: 1.1rem; text-align: center; outline: none; font-weight: bold;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }

        button { background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold; cursor: pointer; }
        .clear-custom { background: var(--clear-gray); color: var(--main); padding: 0 15px; font-size: 0.85rem; }
        .go-btn { flex: 0 0 80px; }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 0; margin-top: auto; }
        .kofi-btn, .home-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; max-width: 320px; padding: 14px; border-radius: var(--radius); font-weight: bold; font-size: 0.9rem; text-decoration: none; }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); }
        footer { padding-bottom: 30px; text-align: center; font-size: 0.75rem; color: #aaa; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>#36 Recipe Multiplier</h1><p class="subtitle">Scale your recipe portions instantly.</p></header>
    <textarea id="recipeInput" placeholder="Paste recipe here..." oninput="handleInput()"></textarea>
    <button class="clear-recipe" onclick="clearRecipe()">Clear Recipe</button>

    <div class="controls">
        <button onclick="multiply(0.5)">x0.5</button>
        <button onclick="multiply(2)">x2</button>
        <button onclick="multiply(3)">x3</button>
        <button onclick="multiply(4)">x4</button>
        <div class="custom-row">
            <input type="number" id="customInput" placeholder="ex) 1.5" step="0.1" inputmode="decimal">
            <button class="clear-custom" onclick="clearCustom()">Clear</button>
            <button class="go-btn" onclick="multiply(document.getElementById('customInput').value)">Go</button>
        </div>
    </div>
</div>
<div class="footer-btns">
    <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">Buy me a coffee</a>
    <button class="home-btn" onclick="alert('Add to Home Screen')">Add to Home Screen</button>
</div>
<footer>No login / No tracking / No ads / Browser only<br>Privacy Policy / afrorakda © 2026</footer>
<script>
    let originalText = "";
    function handleInput() { originalText = document.getElementById('recipeInput').value; }
    function clearRecipe() { document.getElementById('recipeInput').value = ""; originalText = ""; }
    function clearCustom() { document.getElementById('customInput').value = ""; }
    function multiply(ratio) {
        const r = parseFloat(ratio);
        if (isNaN(r) || r <= 0) return;
        if (!originalText) originalText = document.getElementById('recipeInput').value;
        if (!originalText) return;
        let result = originalText.replace(/(\d+)\/(\d+)/g, (m, p1, p2) => (Math.round(parseFloat(p1) * r * 100) / 100) + "/" + p2);
        result = result.replace(/(?<!\/)\b(\d+(\.\d+)?)\b(?!\/)/g, (m) => Math.round(parseFloat(m) * r * 100) / 100);
        document.getElementById('recipeInput').value = result;
    }
</script>
</body>
</html>
